<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-SPMI Offline</title>
    <meta name="theme-color" content="#0f766e">
    <style>
        :root {
            color-scheme: light;
            font-family: "Inter", system-ui, sans-serif;
            background: #f5f7f6;
            color: #0f172a;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 40%),
                linear-gradient(180deg, #fbfffe 0%, #f5f7f6 100%);
        }

        main {
            width: min(32rem, calc(100vw - 2rem));
            padding: 2rem;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.75rem;
        }

        p {
            margin: 0 0 1rem;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.8rem 1rem;
            border-radius: 999px;
            background: #0f766e;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main>
        <h1>Koneksi tidak tersedia</h1>
        <p>Aplikasi masih bisa membuka halaman yang sudah tersimpan di perangkat. Sambungkan kembali internet untuk mengambil data terbaru.</p>
        <a href="/">Coba lagi</a>
    </main>
</body>
</html>
